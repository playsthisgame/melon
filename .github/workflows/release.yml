name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download release binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release download "v${VERSION}" \
            --pattern "mln_${VERSION}_darwin_arm64.tar.gz" \
            --pattern "mln_${VERSION}_darwin_amd64.tar.gz" \
            --pattern "mln_${VERSION}_linux_arm64.tar.gz" \
            --pattern "mln_${VERSION}_linux_amd64.tar.gz" \
            --pattern "mln_${VERSION}_windows_amd64.zip" \
            --dir /tmp/goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract and place binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd /tmp/goreleaser

          tar -xzf "mln_${VERSION}_darwin_arm64.tar.gz" mln
          cp mln $GITHUB_WORKSPACE/npm/packages/melon-darwin-arm64/mln
          chmod +x $GITHUB_WORKSPACE/npm/packages/melon-darwin-arm64/mln

          tar -xzf "mln_${VERSION}_darwin_amd64.tar.gz" mln
          cp mln $GITHUB_WORKSPACE/npm/packages/melon-darwin-x64/mln
          chmod +x $GITHUB_WORKSPACE/npm/packages/melon-darwin-x64/mln

          tar -xzf "mln_${VERSION}_linux_arm64.tar.gz" mln
          cp mln $GITHUB_WORKSPACE/npm/packages/melon-linux-arm64/mln
          chmod +x $GITHUB_WORKSPACE/npm/packages/melon-linux-arm64/mln

          tar -xzf "mln_${VERSION}_linux_amd64.tar.gz" mln
          cp mln $GITHUB_WORKSPACE/npm/packages/melon-linux-x64/mln
          chmod +x $GITHUB_WORKSPACE/npm/packages/melon-linux-x64/mln

          unzip "mln_${VERSION}_windows_amd64.zip" mln.exe
          cp mln.exe $GITHUB_WORKSPACE/npm/packages/melon-windows-x64/mln.exe

      - name: Set version on all packages
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for dir in melon-darwin-arm64 melon-darwin-x64 melon-linux-arm64 melon-linux-x64 melon-windows-x64; do
            (cd npm/packages/$dir && npm version "$VERSION" --no-git-tag-version)
          done
          (cd npm && npm version "$VERSION" --no-git-tag-version)

      - name: Update optionalDependencies versions in main package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd npm
          npm pkg set "optionalDependencies.@playsthisgame/melon-darwin-arm64=$VERSION"
          npm pkg set "optionalDependencies.@playsthisgame/melon-darwin-x64=$VERSION"
          npm pkg set "optionalDependencies.@playsthisgame/melon-linux-arm64=$VERSION"
          npm pkg set "optionalDependencies.@playsthisgame/melon-linux-x64=$VERSION"
          npm pkg set "optionalDependencies.@playsthisgame/melon-windows-x64=$VERSION"

      - name: Copy README
        run: cp README.md npm/README.md

      - name: Publish sub-packages
        run: |
          for dir in melon-darwin-arm64 melon-darwin-x64 melon-linux-arm64 melon-linux-x64 melon-windows-x64; do
            (cd npm/packages/$dir && npm publish --access public)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

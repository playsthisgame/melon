project:
  name: melon
  codename: melon
  command: mln
  description: >
    A dependency manager for agentic markdown files (SKILL.md, AGENT.md, CLAUDE.md, etc.).
    Works like Go modules — packages are referenced by their GitHub URL, versioned by git tags,
    and resolved into a reproducible lock file. The primary artifact is a CLI tool written in Go.
    mln install is the single meaningful command: it resolves deps, fetches skill directories
    at pinned versions via sparse git checkout, writes melon.lock, and copies each skill to the
    correct agent directory derived from agent_compat. No compile step — placement happens
    as part of install.
  language: go
  go_version: "1.22"
  module_path: github.com/your-username/melon

# ─────────────────────────────────────────────
# Agent directory conventions
# Sourced from the vercel-labs/skills agent table.
# Used by install to derive placement paths from agent_compat.
# ─────────────────────────────────────────────
agent_directory_conventions:
  claude-code:
    project: .claude/skills/
    global: ~/.claude/skills/
  cursor:
    project: .agents/skills/
    global: ~/.cursor/skills/
  codex:
    project: .agents/skills/
    global: ~/.codex/skills/
  opencode:
    project: .agents/skills/
    global: ~/.config/opencode/skills/
  windsurf:
    project: .windsurf/skills/
    global: ~/.codeium/windsurf/skills/
  gemini-cli:
    project: .agents/skills/
    global: ~/.gemini/skills/
  github-copilot:
    project: .agents/skills/
    global: ~/.copilot/skills/
  roo:
    project: .roo/skills/
    global: ~/.roo/skills/
  cline:
    project: .agents/skills/
    global: ~/.agents/skills/
  amp:
    project: .agents/skills/
    global: ~/.config/agents/skills/

# ─────────────────────────────────────────────
# Directory structure to scaffold
# ─────────────────────────────────────────────
scaffold:
  directories:
    - cmd/mln              # main package — CLI entrypoint
    - internal/manifest    # mln.yaml read/write
    - internal/resolver    # dependency graph + semver resolution
    - internal/fetcher     # sparse git checkout, tree hash, copy to store
    - internal/lockfile    # melon.lock read/write + diff
    - internal/store       # .melon/ directory management
    - internal/placer      # copy from .melon/ to agent directories
    - internal/agents      # agent_compat -> directory path table
    - pkg/semver           # thin semver helpers (wrap golang.org/x/mod/semver)
    - testdata             # fixture mln.yaml and melon.lock files for tests

  files:
    - path: cmd/mln/main.go
      description: >
        Cobra CLI root command. Registers subcommands: init, install, add, remove.
        Reads global flags: --dir (project root, default cwd), --verbose.
        No compile subcommand — placement is part of install.

    - path: internal/manifest/manifest.go
      description: >
        Defines the Manifest struct that maps 1:1 to mln.yaml.
        Exposes Load(path string) and Save(m Manifest, path string).
        No business logic — pure serialization.

    - path: internal/manifest/schema.go
      description: >
        Go structs used by the manifest parser.
        The outputs field is optional — if absent, install derives placement
        paths from agent_compat via internal/agents.
        The agent_compat field is a []string of agent names from the
        agent_directory_conventions table.

    - path: internal/resolver/resolver.go
      description: >
        Implements Resolve(manifest Manifest) ([]ResolvedDep, error).
        Fetches each dependency's mln.yaml from GitHub raw content API transitively,
        builds a directed acyclic graph, and returns a flat list of pinned versions.
        Uses a greedy highest-compatible-version strategy for MVP (PubGrub in v2).
        Returns ErrVersionConflict if two packages require incompatible versions of
        a shared transitive dep, with a human-readable message naming the conflict.

    - path: internal/fetcher/fetcher.go
      description: >
        Implements Fetch(dep ResolvedDep, storeDir string) error.
        Fetches the entire skill directory tree at the pinned git tag via sparse checkout.

        Algorithm:
          1. Parse dep.name into (repoURL, subdir). A name like
             "anthropics/skills/skills/skill-creator" maps to repo
             "https://github.com/anthropics/skills" and subdir "skills/skill-creator".
             A dep with no subdir (e.g. "alice/pdf-skill") has subdir "".
          2. Shallow-clone at the resolved tag into a temp directory:
               git clone --depth=1 --branch <tag> --no-checkout <repoURL> <tmpdir>
          3. Sparse-checkout the skill subdirectory:
               git -C <tmpdir> sparse-checkout set <subdir or ".">
               git -C <tmpdir> checkout
          4. Copy the subdirectory tree into storeDir.
          5. Compute SHA256 tree hash over all files sorted by relative path.
             Compare against dep.tree_hash from melon.lock — fail on mismatch.
          6. Delete tmpdir.
          7. Skip entirely if storeDir already exists and tree hash matches (idempotent).

        Also exposes LatestTag(owner, repo string) (string, error) using the
        GitHub API to find the latest semver tag. Used by mln add.

    - path: internal/lockfile/lockfile.go
      description: >
        Defines LockFile struct. Exposes Load, Save, and Diff(old, new LockFile).
        Diff returns added, removed, and updated LockedDep slices for CLI output.

    - path: internal/store/store.go
      description: >
        Manages the .melon/ cache directory inside the user's project.
        Exposes InstalledPath(dep ResolvedDep, projectDir string) string,
        EntrypointPath(dep ResolvedDep, projectDir string) string, and
        List(projectDir string) []ResolvedDep.
        Directory layout: .melon/<encoded-name>@<version>/
        encoded-name replaces "/" with "-" for filesystem safety.

    - path: internal/placer/placer.go
      description: >
        Copies installed skill directories from .melon/ to the appropriate agent
        directories. Exposes Place(deps []ResolvedDep, manifest Manifest, projectDir string) error.
        Algorithm:
          1. Call agents.DeriveTargets(manifest) to get the list of target base paths.
             If manifest.outputs is declared, use that instead.
          2. For each dep, copy its directory from store.InstalledPath() into
             each target base path as a subdirectory named after the skill
             (last path segment of dep.name, e.g. "skill-creator").
          3. Overwrite existing files — install is always authoritative.
          4. Print a summary of what was placed and where.
        Placement is idempotent — running install twice produces the same result.

    - path: internal/agents/agents.go
      description: >
        Encodes the agent_directory_conventions table (see top of this config).
        Exposes DeriveTargets(manifest Manifest) ([]string, error) which returns
        the project-scoped skill directory for each agent in manifest.agent_compat.
        Returns ErrUnknownAgent if an agent_compat value is not in the table.
        This is the single source of truth for agent path conventions in melon.

    - path: pkg/semver/semver.go
      description: >
        Thin wrapper around golang.org/x/mod/semver.
        Exposes IsCompatible(constraint, version string) bool using
        standard caret (^) and tilde (~) range semantics.

# ─────────────────────────────────────────────
# Core data types
# ─────────────────────────────────────────────
data_types:

  Manifest:
    description: Parsed representation of a project's mln.yaml
    fields:
      name:         string
      version:      string        # semver, e.g. "1.0.0"
      description:  string
      type:         string        # enum: skill | agent | workflow | persona | memory
      dependencies:
        type: map[string]string   # dep name -> semver constraint
                                  # "alice/pdf-skill": "^1.2.0"
                                  # "anthropics/skills/skills/skill-creator": "^1.0.0"
      outputs:
        type: map[string]string   # OPTIONAL override: target base path -> dep name glob
                                  # e.g. ".claude/skills/": "*"
                                  # If absent, derived automatically from agent_compat.
      agent_compat: '[]string'    # e.g. ["claude-code", "cursor"]
                                  # Drives automatic placement path derivation.
      tags:         '[]string'

  ResolvedDep:
    description: Single dependency with pinned version, output of the resolver
    fields:
      name:       string   # e.g. "anthropics/skills/skills/skill-creator"
      version:    string   # exact pinned semver e.g. "1.3.1"
      repo_url:   string   # https://github.com/anthropics/skills
      subdir:     string   # "skills/skill-creator" or "" if repo root
      git_tag:    string   # e.g. "v1.3.1"
      entrypoint: string   # relative path to SKILL.md within skill directory
      tree_hash:  string   # SHA256 over sorted file paths + contents

  LockFile:
    description: Written to melon.lock — reproducible install snapshot
    fields:
      generated_at: string
      dependencies: '[]LockedDep'

  LockedDep:
    description: One entry in melon.lock
    fields:
      name:       string
      version:    string
      repo_url:   string
      subdir:     string
      git_tag:    string
      entrypoint: string
      tree_hash:  string
      files:      '[]string'   # sorted list of all file paths in the installed directory

# ─────────────────────────────────────────────
# CLI commands
# ─────────────────────────────────────────────
commands:

  init:
    usage: mln init
    description: >
      Interactively scaffolds mln.yaml and creates .melon/ in the current directory.
      Prompts for: name (default cwd name), type, description, agent_compat.
      Writes a fully commented mln.yaml explaining every field.
      Will not overwrite an existing mln.yaml without explicit confirmation.
    flags:
      - name: --yes
        description: Accept all defaults without prompts.
    examples:
      - mln init
      - mln init --yes

  install:
    usage: mln install
    description: >
      The primary command. Does everything in one step:
        1. Reads mln.yaml
        2. Resolves the full dependency graph
        3. Fetches all deps not already in .melon/ with a matching tree_hash
        4. Writes melon.lock
        5. Copies each skill directory from .melon/ to the agent directory
           derived from agent_compat (or declared in outputs)
      Idempotent — running twice produces the same result.
    flags:
      - name: --frozen
        description: Fail if melon.lock would change. For CI pipelines.
      - name: --no-place
        description: >
          Fetch and lock only — skip the placement step. Useful when you want
          to inspect .melon/ before committing to placing files in agent dirs.
    examples:
      - mln install
      - mln install --frozen
      - mln install --no-place

  add:
    usage: mln add <dep>[@version]
    description: >
      Adds a dep to mln.yaml and runs install (including placement).
      If no version given, fetches the latest git tag and pins with ^.
    examples:
      - mln add alice/pdf-skill
      - mln add anthropics/skills/skills/skill-creator
      - mln add anthropics/skills/skills/skill-creator@^1.0.0

  remove:
    usage: mln remove <dep>
    description: >
      Removes a dep from mln.yaml, deletes its .melon/ directory, removes
      its placed files from agent directories, and rewrites melon.lock.
    examples:
      - mln remove alice/pdf-skill

# ─────────────────────────────────────────────
# mln.yaml format
# ─────────────────────────────────────────────
manifest_format:
  example: |
    # mln.yaml — melon manifest
    name: my-coding-agent
    version: 1.0.0
    type: agent
    description: My Claude Code agent with PDF and skill-creator support

    dependencies:
      # Skill at repo root (dedicated repo)
      alice/pdf-skill: "^1.2.0"
      # Skill in a monorepo subdirectory
      anthropics/skills/skills/skill-creator: "^1.0.0"

    # agent_compat tells mln install where to place skill directories.
    # Known agents and their paths:
    #   claude-code  -> .claude/skills/<skill-name>/
    #   cursor       -> .agents/skills/<skill-name>/
    #   codex        -> .agents/skills/<skill-name>/
    #   windsurf     -> .windsurf/skills/<skill-name>/
    #   opencode     -> .agents/skills/<skill-name>/
    agent_compat:
      - claude-code

    # outputs is optional. Declare only when you need non-standard placement.
    # If omitted, paths are derived from agent_compat above.
    # outputs:
    #   .claude/skills/: "*"

    tags:
      - coding-agent

# ─────────────────────────────────────────────
# melon.lock format
# ─────────────────────────────────────────────
lockfile_format:
  example: |
    generated_at: 2026-04-01T12:00:00Z
    dependencies:
      - name: alice/pdf-skill
        version: 1.2.0
        repo_url: https://github.com/alice/pdf-skill
        subdir: ""
        git_tag: v1.2.0
        entrypoint: SKILL.md
        tree_hash: sha256:e3b0c44298fc1c149afbf4c8996fb924...
        files:
          - SKILL.md
          - references/api.md
          - scripts/process.py
      - name: anthropics/skills/skills/skill-creator
        version: 1.0.0
        repo_url: https://github.com/anthropics/skills
        subdir: skills/skill-creator
        git_tag: v1.0.0
        entrypoint: SKILL.md
        tree_hash: sha256:abc123...
        files:
          - SKILL.md
          - agents/grader.md
          - references/schemas.md
          - scripts/aggregate_benchmark.py

# ─────────────────────────────────────────────
# Directory layout after install
# ─────────────────────────────────────────────
layout_after_install:
  description: >
    After mln install, the project contains both a cache (.melon/) and the
    placed skill files in the agent directories. .melon/ is git-ignored.
    The placed agent directories and melon.lock are committed.
  example: |
    .melon/                                                    <- git-ignored
      alice-pdf-skill@1.2.0/
        SKILL.md
        references/api.md
        scripts/process.py
      anthropics-skills-skills-skill-creator@1.0.0/
        SKILL.md
        agents/grader.md
        references/schemas.md
        scripts/aggregate_benchmark.py

    mln.yaml                                                 <- committed
    melon.lock                                                 <- committed
    .claude/skills/pdf-skill/SKILL.md                        <- committed (placed)
    .claude/skills/pdf-skill/references/api.md               <- committed (placed)
    .claude/skills/pdf-skill/scripts/process.py              <- committed (placed)
    .claude/skills/skill-creator/SKILL.md                    <- committed (placed)
    .claude/skills/skill-creator/agents/grader.md            <- committed (placed)

# ─────────────────────────────────────────────
# Go dependencies (go.mod entries)
# ─────────────────────────────────────────────
go_dependencies:
  - module: github.com/spf13/cobra
    reason: CLI framework for subcommands and flags
  - module: gopkg.in/yaml.v3
    reason: mln.yaml and melon.lock parsing and serialization
  - module: golang.org/x/mod
    reason: semver parsing and constraint checking
  - module: github.com/fatih/color
    reason: colored terminal output for summaries and errors
  - module: github.com/stretchr/testify
    reason: test assertions

# ─────────────────────────────────────────────
# Distribution
# ─────────────────────────────────────────────
distribution:
  primary: >
    go install github.com/your-username/melon/cmd/mln@latest
    Requires Go 1.22+. Installs the mln binary into $GOPATH/bin.
  releases: >
    Use GoReleaser with a GitHub Actions workflow triggered on git tag push.
    Produces prebuilt binaries for macOS (arm64 + amd64), Linux, and Windows.
  homebrew: >
    GoReleaser can generate a Homebrew formula automatically.
    Add when there are real users requesting it.

# ─────────────────────────────────────────────
# Development phases
# ─────────────────────────────────────────────
phases:

  phase_1:
    name: Scaffold, manifest, and init
    goal: >
      Repo compiles. mln init works end-to-end. mln.yaml can be read and
      written with helpful errors.
    tasks:
      - Initialize Go module with go mod init
      - Scaffold all directories and stub files listed above
      - Implement internal/agents/agents.go — DeriveTargets with full convention table
      - Implement internal/manifest — Load and Save including optional outputs field
        and agent_compat field
      - Implement pkg/semver — IsCompatible
      - Write unit tests for manifest round-trip and semver constraints
      - Write unit tests for agents.DeriveTargets — known agents return correct paths,
        unknown agents return ErrUnknownAgent
      - Wire up cobra CLI skeleton with init, install, add, remove subcommands
      - Implement init command fully — interactive prompts, mln.yaml generation with
        inline comments, .melon/ directory creation, overwrite protection, --yes flag
      - Write unit test for init — --yes in a temp dir produces a valid mln.yaml
    done_when: >
      go test ./... passes. mln --help prints all four subcommands.
      mln init --yes creates a valid mln.yaml and .melon/ directory.

  phase_2:
    name: Fetch and store
    goal: mln install fetches a real skill directory from GitHub into .melon/
    tasks:
      - Implement internal/fetcher — parse dep name into (repoURL, subdir),
        shallow sparse-checkout at resolved tag, compute SHA256 tree hash,
        copy to store, LatestTag via GitHub API
      - Implement internal/store — InstalledPath, EntrypointPath, List
      - Implement internal/lockfile — Load, Save, Diff
      - Wire install command to fetch direct deps and write melon.lock
        (no transitive resolution and no placement yet)
      - Write integration test using anthropics/skills/skills/skill-creator —
        assert full directory tree in .melon/ and correct melon.lock
    done_when: >
      mln install fetches the full skill directory tree into .melon/ and writes
      a correct melon.lock with tree_hash and files list.

  phase_3:
    name: Resolver and add
    goal: Transitive dependencies are resolved and installed correctly
    tasks:
      - Implement internal/resolver — fetch melon.yaml transitively via GitHub raw API,
        build full dep graph, greedy semver resolution, ErrVersionConflict
      - Update install to use resolver output instead of direct deps only
      - Implement add command — LatestTag, update mln.yaml, run full install
      - Implement --frozen flag on install
      - Write unit tests for resolver with fixture manifests in testdata/ covering
        happy path, transitive deps, and version conflict error message
    done_when: >
      mln add on a package with transitive deps installs and places the full
      tree and writes a correct melon.lock.
      mln install --frozen fails if melon.lock would change.

  phase_4:
    name: Polish and release
    goal: Full MVP CLI is complete and ready for release.
    tasks:
      - Add colored output throughout using fatih/color
      - Write README.md — install instructions, full command reference,
        agent_compat convention table, how melon differs from npx skills
      - Add .gitignore entries (.melon/ ignored, agent dirs and melon.lock committed)
      - Add .goreleaser.yaml and GitHub Actions workflow for binary releases on tag push
    done_when: >
      go install github.com/your-username/melon/cmd/mln@latest works from a clean machine.
      All four commands work reliably end-to-end on real GitHub skill repos.

# ─────────────────────────────────────────────
# Testing strategy
# ─────────────────────────────────────────────
testing:
  framework: go test
  unit_tests:
    - internal/manifest: round-trip Load -> Save -> Load produces identical struct
    - internal/manifest: missing required fields produce typed errors
    - pkg/semver: table-driven tests for ^, ~, and exact constraints
    - "internal/agents: DeriveTargets returns correct paths for known agents, ErrUnknownAgent for unknown values"
    - "internal/resolver: fixture manifests in testdata/ — happy path, transitive, version conflict error message"
    - internal/lockfile: Diff returns correct added/removed/updated sets
    - cmd/mln init: --yes in a temp dir produces valid mln.yaml and .melon/

  integration_tests:
    - description: >
        mln install fetches a real monorepo dep. Assert .melon/ directory tree
        and melon.lock tree_hash and files list match actual installed content.
      fixture: anthropics/skills/skills/skill-creator
    - description: >
        mln install with agent_compat: [claude-code] places skills into
        .claude/skills/<skill-name>/. Assert files present at correct paths.
    - description: >
        mln install with explicit outputs block places skills to declared
        paths, not agent_compat-derived paths.
    - description: >
        mln add on a dep with a transitive dep. Assert both in melon.lock
        and both placed in agent dirs.
    - description: >
        mln install --frozen after modifying mln.yaml. Assert non-zero exit.
    - description: >
        mln remove cleans .melon/ entry, placed files in agent dirs, and
        rewrites melon.lock. Assert no trace remains.

# ─────────────────────────────────────────────
# Key design decisions
# ─────────────────────────────────────────────
design_decisions:
  - decision: Placement happens during install, not as a separate compile step
    rationale: >
      The compile step was originally designed to handle assembly, conflict
      detection, and placement. After scoping down, placement was the only
      remaining job of compile — which made it an unnecessary extra step.
      Since placement is deterministic and has no prerequisites beyond a
      successful fetch, folding it into install gives users a single command
      that takes them from manifest to working agent setup. The --no-place
      flag preserves the ability to fetch without placing for users who want
      to inspect .melon/ first.

  - decision: No compile command in MVP
    rationale: >
      The compile step was conceived to handle @directive conflict detection
      and skill assembly. Both features were deferred: conflict detection
      requires a @directive convention that doesn't yet exist in the wild,
      and assembly solves a problem (merging skills into one file) that real
      users haven't demonstrated they need. Building for hypothetical problems
      before there are real users is premature. These features can return as
      v2 once there is evidence they are needed.

  - decision: Go over TypeScript
    rationale: >
      Melon is a systems CLI — it shells out to git, reads YAML, resolves a
      dependency graph, and copies files to disk. Go is the natural fit:
      single binary, fast startup, no runtime dependency, trivial cross-platform
      distribution. The switch to TypeScript was motivated solely by using the
      vercel-labs/skills npm library as a fetching backend. Since that library
      does not support version pinning, we write our own fetcher and Go is the
      clear choice.

  - decision: Custom sparse git fetcher
    rationale: >
      The vercel-labs/skills CLI always pulls from the latest default branch
      with no support for version pinning. Melon's core promise is a lock file
      that guarantees reproducible installs. A fetcher that ignores version pins
      breaks that promise at the foundation. The sparse git checkout approach
      is straightforward and gives melon full control.

  - decision: Output paths derived from agent_compat, with outputs as an override
    rationale: >
      The agent directory conventions are stable and well-known. Deriving paths
      automatically from agent_compat makes the common case zero-config.
      The outputs block exists for non-standard placement and multi-agent projects.

  - decision: Placed files and melon.lock are committed, .melon/ is not
    rationale: >
      Placed skill files are what agents consume. They should be in version
      control — reviewable in PRs, available in fresh checkouts, diffable when
      skills update. .melon/ is a fetch cache, like node_modules. melon.lock
      guarantees that any machine can reproduce the same fetch.

  - decision: Greedy semver resolution for MVP, not PubGrub
    rationale: >
      PubGrub is more complex for marginally better error messages. For MVP,
      greedy resolution is sufficient. Upgrade in v2 if needed.

  - decision: No central registry for MVP
    rationale: >
      Dep names are GitHub references and self-describing. Registry
      infrastructure is a v2 problem. skillsmp.com and skills.sh already
      serve discovery for the broader ecosystem.